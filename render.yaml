services:
  - type: web
    name: skilllink-backend
    runtime: node
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: skilllink-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://your-frontend.vercel.app
    healthCheckPath: /api

databases:
  - name: skilllink-db
    databaseName: skilllink
    plan: free
